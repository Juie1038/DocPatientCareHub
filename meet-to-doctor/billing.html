<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Billing – DocPatientCareHub</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#f5f7fa;color:#1a1d26;font-size:14px}
nav{background:#fff;border-bottom:1px solid #e8eaf0;padding:0 24px;display:flex;align-items:center;height:60px;position:sticky;top:0;z-index:200;gap:32px}
.logo{display:flex;align-items:center;gap:8px;text-decoration:none;flex-shrink:0}
.logo-icon{width:36px;height:36px;background:#1a5cff;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px}
.logo-text{font-size:1.2rem;font-weight:700;color:#1a1d26}.logo-text span{color:#1a5cff}
.logo-sub{font-size:9px;color:#888;display:block;margin-top:-2px;font-weight:400}
.nav-links{display:flex;align-items:center;gap:4px;flex:1}
.nav-links a{text-decoration:none;font-size:0.88rem;font-weight:500;color:#444;padding:6px 12px;border-radius:6px;transition:all .15s}
.nav-links a:hover{background:#f0f4ff;color:#1a5cff}
.nav-links a.active{color:#1a5cff;font-weight:600}
.nav-right{display:flex;align-items:center;gap:10px}
.nav-btn{background:#1a5cff;color:#fff;border:none;padding:8px 18px;border-radius:6px;font-family:'Inter',sans-serif;font-size:0.875rem;font-weight:600;cursor:pointer}
.nav-btn-outline{background:#fff;color:#1a5cff;border:1.5px solid #1a5cff;padding:7px 16px;border-radius:6px;font-family:'Inter',sans-serif;font-size:0.875rem;font-weight:600;cursor:pointer}
.user-chip{display:flex;align-items:center;gap:8px;background:#f0f4ff;border-radius:20px;padding:5px 12px 5px 5px;cursor:pointer}
.user-avatar{width:28px;height:28px;background:#1a5cff;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:0.75rem}
.user-chip span{font-size:0.82rem;font-weight:600;color:#1a1d26}
.page-wrap{max-width:1000px;margin:0 auto;padding:24px}
.page-header{margin-bottom:24px}
.page-header h1{font-size:1.5rem;font-weight:800;color:#1a1d26}
.page-header p{font-size:0.88rem;color:#6b7280;margin-top:4px}
.summary-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px}
.sum-card{background:#fff;border:1px solid #e8eaf0;border-radius:12px;padding:20px}
.sum-card .label{font-size:0.78rem;color:#6b7280;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.sum-card .val{font-size:1.8rem;font-weight:800;color:#1a1d26}
.sum-card .sub{font-size:0.75rem;color:#6b7280;margin-top:4px}
.sum-card.blue .val{color:#1a5cff}
.sum-card.green .val{color:#16a34a}
.sum-card.red .val{color:#b91c1c}
.bill-card{background:#fff;border:1px solid #e8eaf0;border-radius:12px;padding:16px 20px;margin-bottom:12px;display:grid;grid-template-columns:auto 1fr auto auto;gap:16px;align-items:center;transition:box-shadow .2s}
.bill-card:hover{box-shadow:0 4px 16px rgba(26,92,255,.08)}
.bill-num{width:40px;height:40px;background:#f0f4ff;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
.bill-info h3{font-size:0.88rem;font-weight:700;color:#1a1d26;margin-bottom:3px}
.bill-info p{font-size:0.75rem;color:#6b7280}
.bill-amount{font-size:1.1rem;font-weight:800;color:#1a5cff;text-align:right}
.bill-amount .date{font-size:0.72rem;color:#6b7280;font-weight:400;display:block;margin-top:2px}
.pill{display:inline-block;font-size:0.7rem;font-weight:600;padding:3px 10px;border-radius:20px}
.pill.paid{background:#dcfce7;color:#166534}
.pill.unpaid{background:#fee2e2;color:#b91c1c}
.pill.refunded{background:#fef9c3;color:#a16207}
.pay-btn{background:#1a5cff;color:#fff;border:none;border-radius:7px;padding:7px 16px;font-family:'Inter',sans-serif;font-size:0.78rem;font-weight:600;cursor:pointer;transition:background .15s;margin-top:6px;display:block}
.pay-btn:hover{background:#1248d6}
.receipt-icon{font-size:13px;color:#6b7280;cursor:pointer;background:none;border:1.5px solid #e0e4ef;border-radius:6px;padding:5px 10px;font-family:'Inter',sans-serif;font-weight:600;transition:all .15s}
.receipt-icon:hover{border-color:#1a5cff;color:#1a5cff;background:#f0f4ff}
.empty{text-align:center;padding:60px 20px;color:#6b7280}
.empty .icon{font-size:48px;margin-bottom:14px}
.login-prompt{background:#fff;border:2px dashed #b8c8ff;border-radius:12px;padding:40px;text-align:center}
footer{background:#1a5cff;padding:20px 24px;margin-top:32px;text-align:center;font-size:0.78rem;color:rgba(255,255,255,.7)}
#toast{position:fixed;bottom:24px;right:24px;background:#1a1d26;color:#fff;padding:12px 20px;border-radius:8px;font-size:.85rem;font-weight:500;z-index:9999;transition:all .3s;transform:translateY(80px);opacity:0;pointer-events:none}
#toast.show{transform:translateY(0);opacity:1}
#toast.success{background:#166534}
#toast.error{background:#b91c1c}
</style>
</head>
<body>
<div id="toast"></div>
<nav>
  <a href="index.html" class="logo"><div class="logo-icon">🏥</div><div><div class="logo-text">DocPatientCareHub</div><span class="logo-sub">Healthcare Anytime Anywhere</span></div></a>
  <div class="nav-links">
    <a href="index.html">Consultation</a>
    <a href="doctors.html">Find Doctors</a>
    <a href="appointments.html">Appointments</a>
    <a href="billing.html" class="active">Billing</a>
  </div>
  <div class="nav-right" id="navRight"></div>
</nav>

<div class="page-wrap">
  <div class="page-header">
    <h1>💳 Billing & Payments</h1>
    <p>View all your invoices and payment history</p>
  </div>
  <div id="mainContent">Loading…</div>
</div>

<footer>© 2026 DocPatientCareHub – Meet to Doctor: Patient Care. All rights reserved.</footer>

<script>
const API='backend.php';
const currentUser=JSON.parse(localStorage.getItem('dtUser')||'null');

function toast(msg,type=''){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className='show '+type;
  setTimeout(()=>el.className='',3000);
}

function updateNav(){
  const nr=document.getElementById('navRight');
  if(currentUser){
    const initials=currentUser.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    nr.innerHTML=`<div class="user-chip"><div class="user-avatar">${initials}</div><span>${currentUser.name.split(' ')[0]}</span></div>
      <button class="nav-btn-outline" onclick="doLogout()">Logout</button>`;
  } else {
    nr.innerHTML=`<button class="nav-btn-outline" onclick="location.href='index.html'">Log in</button>
      <button class="nav-btn" onclick="location.href='index.html'">Register</button>`;
  }
}

async function doLogout(){
  await fetch(`${API}?action=logout`,{method:'POST'}).catch(()=>{});
  localStorage.removeItem('dtUser');location.href='index.html';
}

async function init(){
  const content=document.getElementById('mainContent');
  if(!currentUser){
    content.innerHTML=`<div class="login-prompt"><div style="font-size:40px;margin-bottom:12px">🔐</div>
      <h3 style="font-size:1rem;font-weight:700;margin-bottom:6px">Login to View Billing</h3>
      <p style="font-size:.85rem;color:#6b7280;margin-bottom:16px">You need to be logged in to view your billing history.</p>
      <button onclick="location.href='index.html'" style="background:#1a5cff;color:#fff;border:none;padding:10px 24px;border-radius:8px;font-family:'Inter',sans-serif;font-size:.88rem;font-weight:600;cursor:pointer">Go to Login</button></div>`;
    return;
  }

  try{
    const r=await fetch(`${API}?action=get_billing`);
    const d=await r.json();
    const bills=d.data||[];

    const totalAmount = bills.reduce((s,b)=>s+parseFloat(b.amount),0);
    const paidAmount  = bills.filter(b=>b.status==='paid').reduce((s,b)=>s+parseFloat(b.amount),0);
    const unpaidCount = bills.filter(b=>b.status==='unpaid').length;

    content.innerHTML=`
      <div class="summary-cards">
        <div class="sum-card blue">
          <div class="label">Total Invoiced</div>
          <div class="val">৳${totalAmount.toLocaleString()}</div>
          <div class="sub">${bills.length} invoice${bills.length!==1?'s':''}</div>
        </div>
        <div class="sum-card green">
          <div class="label">Total Paid</div>
          <div class="val">৳${paidAmount.toLocaleString()}</div>
          <div class="sub">${bills.filter(b=>b.status==='paid').length} paid</div>
        </div>
        <div class="sum-card red">
          <div class="label">Outstanding</div>
          <div class="val">৳${(totalAmount-paidAmount).toLocaleString()}</div>
          <div class="sub">${unpaidCount} unpaid bill${unpaidCount!==1?'s':''}</div>
        </div>
      </div>
      <div id="billsList"></div>`;

    const list=document.getElementById('billsList');
    if(!bills.length){
      list.innerHTML='<div class="empty"><div class="icon">💳</div><p>No billing records yet.</p></div>';
      return;
    }
    list.innerHTML=bills.map(b=>`
      <div class="bill-card">
        <div class="bill-num">💊</div>
        <div class="bill-info">
          <h3>Consultation – Dr. ${b.doctor_name}</h3>
          <p>📅 ${b.appt_date} ⏰ ${b.appt_time?b.appt_time.slice(0,5):''} · Bill #${b.bill_id}</p>
        </div>
        <div style="text-align:right">
          <div class="bill-amount">৳${parseFloat(b.amount).toLocaleString()}<span class="date">${b.date}</span></div>
        </div>
        <div style="text-align:right">
          <span class="pill ${b.status}">${b.status}</span>
          ${b.status==='unpaid'?`<button class="pay-btn" onclick="payBill(${b.bill_id})">Pay Now</button>`:''}
        </div>
      </div>`).join('');
  } catch(e){
    content.innerHTML='<div class="empty"><div class="icon">⚠️</div><p>Could not connect to backend.</p></div>';
  }
}

async function payBill(id){
  if(!confirm('Confirm payment for this bill?')) return;
  const fd=new FormData();fd.append('bill_id',id);
  const r=await fetch(`${API}?action=pay_bill`,{method:'POST',body:fd});
  const d=await r.json();
  toast(d.message,d.success?'success':'error');
  if(d.success) init();
}

updateNav();
init();
</script>
</body>
</html>
